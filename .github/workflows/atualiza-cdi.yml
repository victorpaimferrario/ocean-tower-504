name: Atualiza CDI

on:
  schedule:
    - cron: '0 9 1 * *'    # todo dia 1, 09:00 UTC (06:00 de Brasília)
  workflow_dispatch:         # botão "Run workflow" para rodar na hora

permissions:
  contents: write

jobs:
  atualiza-cdi:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Buscar Selic/CDI no Banco Central e gravar cdi.json
        run: |
          set -e
          VALOR=$(curl -sS "https://api.bcb.gov.br/dados/serie/bcdata.sgs.432/dados/ultimos/1?formato=json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d[-1]['valor']).replace(',','.'))")
          if [ -z "$VALOR" ]; then echo "Falha ao obter o valor do BCB"; exit 1; fi
          DATA=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "cdi_aa": %s,\n  "fonte": "Banco Central - SGS serie 432 (Selic meta, %% a.a.)",\n  "atualizado_em": "%s"\n}\n' "$VALOR" "$DATA" > cdi.json
          echo "cdi.json atualizado para $VALOR"

      - name: Commitar se houver mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cdi.json
          git diff --staged --quiet || git commit -m "Atualiza CDI (Selic meta) - $(date -u +%Y-%m-%d)"
          git push
